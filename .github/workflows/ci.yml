name: CI - Build & Test

on:
  push:
    branches-ignore:
      - sandbox
      - production

  pull_request:
    branches:
      - sandbox
      - production

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & Test
        run: mvn clean verify
