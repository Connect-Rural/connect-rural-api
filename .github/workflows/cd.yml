name: CI - Build & Test

on:
  push:
    branches:
      - "**"
      - "!sandbox"
      - "!production"

  pull_request:
    branches:
      - "**"
      - "!sandbox"
      - "!production"

jobs:

  build:
    name: Build project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Build without tests
        run: mvn clean package -DskipTests


  tests:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build   # <- Esto hace que espere a que termine build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn test -Dspring.profiles.active=test
