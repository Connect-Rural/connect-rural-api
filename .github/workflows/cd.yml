name: CD - Build & Docker

on:
  push:
    branches:
      - sandbox
      - production

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & Test
        run: mvn clean verify


  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ "${GITHUB_REF_NAME}" = "sandbox" ]; then
            docker build -t connect-rural:sandbox .
          else
            docker build -t connect-rural:latest .
          fi
